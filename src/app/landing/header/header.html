<section class="hero position-relative custom-carousel-wrapper">
  <div class="hero-background">
    <div *ngFor="let img of images; let i = index" class="carousel-item-custom"
      [class.active]="i === currentImageIndex">
      <img [src]="img" class="carousel-img" [alt]="'Cementerio fondo ' + i">
    </div>
  </div>
  <div class="carousel-overlay"></div>

  <div class="hero-content">
    <div class="hero-accent-top"></div>
    <h1 class="hero-title"><a routerLink="/" style="color: inherit; text-decoration: none;">AETERNUM</a></h1>
    <div class="hero-divider"></div>
    <p class="hero-description">
      Digitalizando la memoria, modernizando la administración y conectando
      a los ciudadanos con su historia familiar.
    </p>
    <div class="header-buttons">
      <button routerLink="/login" class="primary-btn">
        <span class="btn-text">Acceder al sistema</span>
      </button>
      <a routerLink="/busqueda" class="secondary-btn">
        <span class="btn-text">Buscar difunto</span>
      </a>
    </div>
  </div>

  <div class="scroll-indicator">
    <span>Desliza para más</span>
    <div class="scroll-arrow">↓</div>
  </div>
</section>
